<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Face outline (oval face) -->
  <ellipse cx="50" cy="52" rx="36" ry="40" fill="#FDDCB5"/>
  <!-- Hair (thick black eyebrows) -->
  <ellipse cx="50" cy="18" rx="32" ry="16" fill="#2D2D2D"/>
  <rect x="18" y="18" width="64" height="8" rx="4" fill="#2D2D2D"/>
  <!-- Thick eyebrows -->
  <rect x="28" y="40" width="18" height="6" rx="3" fill="#2D2D2D"/>
  <rect x="54" y="40" width="18" height="6" rx="3" fill="#2D2D2D"/>
  <!-- Eyes -->
  <ellipse cx="37" cy="50" rx="8" ry="9" fill="white"/>
  <ellipse cx="63" cy="50" rx="8" ry="9" fill="white"/>
  <ellipse cx="37" cy="50" rx="4" ry="5" fill="#2D2D2D"/>
  <ellipse cx="63" cy="50" rx="4" ry="5" fill="#2D2D2D"/>
  <!-- Mouth (wide grin) -->
  <path d="M 30 68 Q 50 82 70 68" fill="none" stroke="#2D2D2D" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Cheek blush -->
  <ellipse cx="25" cy="62" rx="8" ry="5" fill="#FFB5B5" opacity="0.5"/>
  <ellipse cx="75" cy="62" rx="8" ry="5" fill="#FFB5B5" opacity="0.5"/>
  <!-- Red T-shirt hint -->
  <rect x="14" y="86" width="72" height="14" rx="4" fill="#E53935"/>
</svg>
