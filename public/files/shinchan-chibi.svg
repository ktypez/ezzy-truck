<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 160">
  <!-- Head -->
  <ellipse cx="40" cy="28" rx="28" ry="26" fill="#FDDCB5"/>
  <!-- Hair -->
  <ellipse cx="40" cy="10" rx="24" ry="12" fill="#2D2D2D"/>
  <rect x="16" y="10" width="48" height="5" rx="2.5" fill="#2D2D2D"/>
  <!-- Eyebrows -->
  <rect x="24" y="22" width="12" height="4" rx="2" fill="#2D2D2D"/>
  <rect x="44" y="22" width="12" height="4" rx="2" fill="#2D2D2D"/>
  <!-- Eyes -->
  <ellipse cx="32" cy="29" rx="5" ry="6" fill="white"/>
  <ellipse cx="48" cy="29" rx="5" ry="6" fill="white"/>
  <ellipse cx="32" cy="29" rx="2.5" ry="3.5" fill="#2D2D2D"/>
  <ellipse cx="48" cy="29" rx="2.5" ry="3.5" fill="#2D2D2D"/>
  <!-- Cheeks -->
  <ellipse cx="18" cy="36" rx="6" ry="4" fill="#FFB5B5" opacity="0.5"/>
  <ellipse cx="62" cy="36" rx="6" ry="4" fill="#FFB5B5" opacity="0.5"/>
  <!-- Mouth -->
  <path d="M 32 40 Q 40 48 48 40" fill="none" stroke="#2D2D2D" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Body / Red T-shirt -->
  <rect x="18" y="50" width="44" height="40" rx="6" fill="#E53935"/>
  <!-- Collar -->
  <path d="M 24 50 L 40 58 L 56 50" fill="none" stroke="#C62828" stroke-width="2"/>
  <!-- Shorts -->
  <rect x="18" y="88" width="44" height="24" rx="4" fill="#FFA000"/>
  <!-- Legs -->
  <rect x="22" y="110" width="10" height="30" rx="3" fill="#FDDCB5"/>
  <rect x="48" y="110" width="10" height="30" rx="3" fill="#FDDCB5"/>
  <!-- Shoes -->
  <ellipse cx="27" cy="143" rx="8" ry="5" fill="#2D2D2D"/>
  <ellipse cx="53" cy="143" rx="8" ry="5" fill="#2D2D2D"/>
  <!-- Arms -->
  <rect x="8" y="54" width="12" height="28" rx="5" fill="#FDDCB5"/>
  <rect x="60" y="54" width="12" height="28" rx="5" fill="#FDDCB5"/>
</svg>
